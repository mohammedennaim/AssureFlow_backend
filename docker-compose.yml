# ============================================================
# 🐳 Docker Compose - Insurance Platform (AssureFlow)
# ============================================================
# Lancer tout le projet : docker-compose up -d --build
# Arrêter tout           : docker-compose down
# Voir les logs          : docker-compose logs -f <service-name>
# ============================================================

services:

  # ==========================================================
  # 🗄️ INFRASTRUCTURE - PostgreSQL
  # ==========================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: assureflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Persistance des données
      - postgres-data:/var/lib/postgresql/data
      # Script d'initialisation (crée les DBs au premier lancement)
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================
  # 📨 INFRASTRUCTURE - Zookeeper (requis par Kafka)
  # ==========================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: assureflow-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # 📨 INFRASTRUCTURE - Apache Kafka
  # ==========================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: assureflow-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listeners internes (entre conteneurs) et externes (depuis l'hôte)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Création automatique des topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"    # Accès depuis l'hôte
      - "29092:29092"  # Accès interne entre conteneurs
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================
  # 🔴 INFRASTRUCTURE - Redis (Cache & Sessions)
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: assureflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - insurance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # 🏢 MICROSERVICES APPLICATIFS
  # ==========================================================

  # ---- 📋 Policy Service (Gestion des Polices) ----
  policy-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: policy-service
    container_name: assureflow-policy-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${POLICY_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${POLICY_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- 👤 Client Service (Gestion des Clients) ----
  client-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: client-service
    container_name: assureflow-client-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${CLIENT_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${CLIENT_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- 💰 Billing Service (Facturation & Paiements) ----
  billing-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: billing-service
    container_name: assureflow-billing-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${BILLING_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${BILLING_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- 🚨 Claims Service (Gestion des Sinistres) ----
  claims-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: claims-service
    container_name: assureflow-claims-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${CLAIMS_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${CLAIMS_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- 🔔 Notification Service ----
  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: assureflow-notification-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${NOTIFICATION_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- 🔐 IAM Service (Identity & Access Management) ----
  iam-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: iam-service
    container_name: assureflow-iam-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${IAM_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_REDIS_HOST: ${REDIS_HOST}
      SPRING_REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${IAM_SERVICE_PORT}:8080"
    networks:
      - insurance-net

  # ---- ⚙️ Workflow Service (Saga Orchestrator) ----
  workflow-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: workflow-service
    container_name: assureflow-workflow-service
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${WORKFLOW_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "${WORKFLOW_SERVICE_PORT}:8080"
    networks:
      - insurance-net

# ==========================================================
# 🌐 RÉSEAUX
# ==========================================================
networks:
  insurance-net:
    driver: bridge
    name: insurance-net

# ==========================================================
# 💾 VOLUMES (Persistance des données)
# ==========================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
