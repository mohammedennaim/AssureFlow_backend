server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Configuration globale
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: 
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://127.0.0.1:*"
              - "https://127.0.0.1:*"
              - "http://assureflow-frontend:*"
              - "https://assureflow-frontend:*"
            allowedMethods: 
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
              - HEAD
            allowedHeaders: 
              - "*"
            allowCredentials: true
            exposedHeaders:
              - "Authorization"
              - "Content-Type"
              - "X-Total-Count"
              - "X-Correlation-ID"
            maxAge: 3600

      # Routes vers les microservices
      routes:
        # ========================================
        # 🔐 IAM SERVICE - Authentication & Authorization
        # ========================================
        - id: iam-auth-public
          uri: http://iam-service:8080
          predicates:
            - Path=/api/v1/auth/login, /api/v1/auth/register, /api/v1/auth/forgot-password, /api/v1/auth/reset-password
            - Method=POST
          filters:
            - StripPrefix=0

        - id: iam-auth-secured
          uri: http://iam-service:8080
          predicates:
            - Path=/api/v1/auth/logout, /api/v1/auth/refresh, /api/v1/auth/change-password, /api/v1/auth/profile
          filters:
            - StripPrefix=0

        - id: iam-users
          uri: http://iam-service:8080
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        - id: iam-roles
          uri: http://iam-service:8080
          predicates:
            - Path=/api/v1/roles/**
          filters:
            - StripPrefix=0

        # ========================================
        # 👥 CLIENT SERVICE - Customer Management
        # ========================================
        - id: client-service-read
          uri: http://client-service:8080
          predicates:
            - Path=/api/v1/clients, /api/v1/clients/{id}, /api/v1/clients/search, /api/v1/clients/{id}/policies, /api/v1/clients/{id}/claims
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: client-service-cb
                fallbackUri: forward:/fallback/clients

        - id: client-service-write
          uri: http://client-service:8080
          predicates:
            - Path=/api/v1/clients, /api/v1/clients/{id}
            - Method=POST,PUT,DELETE
          filters:
            - StripPrefix=0

        - id: client-addresses
          uri: http://client-service:8080
          predicates:
            - Path=/api/v1/clients/{id}/addresses/**
          filters:
            - StripPrefix=0

        # ========================================
        # 📋 POLICY SERVICE - Insurance Policies
        # ========================================
        - id: policy-service-read
          uri: http://policy-service:8080
          predicates:
            - Path=/api/v1/policies, /api/v1/policies/{id}, /api/v1/policies/search, /api/v1/policies/client/{clientId}
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: policy-service-cb
                fallbackUri: forward:/fallback/policies

        - id: policy-service-write
          uri: http://policy-service:8080
          predicates:
            - Path=/api/v1/policies, /api/v1/policies/{id}, /api/v1/policies/{id}/activate, /api/v1/policies/{id}/suspend, /api/v1/policies/{id}/renew, /api/v1/policies/{id}/cancel, /api/v1/policies/{id}/expire, /api/v1/policies/{id}/submit, /api/v1/policies/{id}/approve, /api/v1/policies/{id}/reject
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=0

        - id: policy-premium-calculation
          uri: http://policy-service:8080
          predicates:
            - Path=/api/v1/policies/calculate-premium
            - Method=POST
          filters:
            - StripPrefix=0

        # ========================================
        # 💰 BILLING SERVICE - Invoices & Payments
        # ========================================
        - id: billing-invoices-read
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/invoices, /api/v1/invoices/{id}, /api/v1/invoices/number/{invoiceNumber}, /api/v1/invoices/policy/{policyId}, /api/v1/invoices/client/{clientId}
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: billing-service-cb
                fallbackUri: forward:/fallback/billing

        - id: billing-invoices-write
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/invoices, /api/v1/invoices/{id}, /api/v1/invoices/{id}/cancel, /api/v1/invoices/{invoiceId}/pay/{paymentId}
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=0

        - id: billing-payments-read
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/payments, /api/v1/payments/{id}, /api/v1/payments/invoice/{invoiceId}, /api/v1/payments/client/{clientId}
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: billing-service-cb
                fallbackUri: forward:/fallback/billing

        - id: billing-payments-write
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/payments, /api/v1/payments/{id}
            - Method=POST,PUT,DELETE
          filters:
            - StripPrefix=0

        - id: billing-overdue
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/billing/overdue, /api/v1/billing/reminders
          filters:
            - StripPrefix=0

        # ========================================
        # 🚨 CLAIMS SERVICE - Insurance Claims
        # ========================================
        - id: claims-service-read
          uri: http://claims-service:8080
          predicates:
            - Path=/api/v1/claims, /api/v1/claims/{id}, /api/v1/claims/policy/{policyId}, /api/v1/claims/client/{clientId}
            - Method=GET
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: claims-service-cb
                fallbackUri: forward:/fallback/claims

        - id: claims-workflow
          uri: http://claims-service:8080
          predicates:
            - Path=/api/v1/claims/{id}/approve, /api/v1/claims/{id}/reject, /api/v1/claims/{id}/payout, /api/v1/claims/{id}/close, /api/v1/claims/{id}/submit, /api/v1/claims/{id}/review, /api/v1/claims/{id}/request-info, /api/v1/claims/{id}/mark-as-paid, /api/v1/claims/{id}/archive
            - Method=POST
          filters:
            - StripPrefix=0

        - id: claims-service-write
          uri: http://claims-service:8080
          predicates:
            - Path=/api/v1/claims, /api/v1/claims/{id}
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=0

        # ========================================
        # 📧 NOTIFICATION SERVICE - Communications
        # ========================================
        - id: notification-send
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/*/send
            - Method=POST
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: notification-service-cb
                fallbackUri: forward:/fallback/notifications

        - id: notification-templates
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/templates/**
          filters:
            - StripPrefix=0

        # ========================================
        # 🔄 WORKFLOW SERVICE - SAGA Orchestration, Audit, SLA, Escalations
        # ========================================
        - id: workflow-saga
          uri: http://workflow-service:8080
          predicates:
            - Path=/api/v1/sagas/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: workflow-service-cb
                fallbackUri: forward:/fallback/workflow

        - id: workflow-audit
          uri: http://workflow-service:8080
          predicates:
            - Path=/api/v1/audit/**
          filters:
            - StripPrefix=0

        - id: workflow-sla
          uri: http://workflow-service:8080
          predicates:
            - Path=/api/v1/sla/**
          filters:
            - StripPrefix=0

        - id: workflow-escalations
          uri: http://workflow-service:8080
          predicates:
            - Path=/api/v1/escalations/**
          filters:
            - StripPrefix=0

        # ========================================
        # 📚 SWAGGER API DOCS - Service Documentation
        # ========================================
        - id: iam-api-docs
          uri: http://iam-service:8080
          predicates:
            - Path=/v3/api-docs/iam-service
          filters:
            - RewritePath=/v3/api-docs/iam-service, /v3/api-docs

        - id: client-api-docs
          uri: http://client-service:8080
          predicates:
            - Path=/v3/api-docs/client-service
          filters:
            - RewritePath=/v3/api-docs/client-service, /v3/api-docs

        - id: policy-api-docs
          uri: http://policy-service:8080
          predicates:
            - Path=/v3/api-docs/policy-service
          filters:
            - RewritePath=/v3/api-docs/policy-service, /v3/api-docs

        - id: claims-api-docs
          uri: http://claims-service:8080
          predicates:
            - Path=/v3/api-docs/claims-service
          filters:
            - RewritePath=/v3/api-docs/claims-service, /v3/api-docs

        - id: notification-api-docs
          uri: http://notification-service:8080
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

        - id: workflow-api-docs
          uri: http://workflow-service:8080
          predicates:
            - Path=/v3/api-docs/workflow-service
          filters:
            - RewritePath=/v3/api-docs/workflow-service, /v3/api-docs

        - id: billing-api-docs
          uri: http://billing-service:8080
          predicates:
            - Path=/v3/api-docs/billing-service
          filters:
            - RewritePath=/v3/api-docs/billing-service, /v3/api-docs

        # ========================================
        # 🔧 ACTUATOR & HEALTH CHECKS
        # ========================================
        - id: actuator-health
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/health, /actuator/info, /actuator/prometheus
          filters:
            - StripPrefix=0

        # ========================================
        # 🚫 FALLBACK ROUTES
        # ========================================
        - id: fallback-route
          uri: http://localhost:8080
          predicates:
            - Path=/fallback/**
          filters:
            - StripPrefix=1

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: All Services
        url: /v3/api-docs/all
      - name: IAM Service
        url: /v3/api-docs/iam-service
      - name: Client Service
        url: /v3/api-docs/client-service
      - name: Policy Service
        url: /v3/api-docs/policy-service
      - name: Claims Service
        url: /v3/api-docs/claims-service
      - name: Notification Service
        url: /v3/api-docs/notification-service
      - name: Workflow Service
        url: /v3/api-docs/workflow-service
      - name: Billing Service
        url: /v3/api-docs/billing-service
    urls-primary-name: All Services

# JWT
jwt:
  secret: ${JWT_SECRET:myDefaultSecretKeyForDevelopmentOnlyMinimum32Characters}

# CORS Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://127.0.0.1:4200}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*}
    max-age: ${CORS_MAX_AGE:3600}

# Security Configuration
security:
  headers:
    frame-options: DENY
    content-type-options: nosniff
    xss-protection: "1; mode=block"
    referrer-policy: strict-origin-when-cross-origin

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
