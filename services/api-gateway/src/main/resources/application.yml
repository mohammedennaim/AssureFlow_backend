server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Configuration globale
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:4200"
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"

      # Routes vers les microservices
      routes:
        # --- IAM Service ---
        - id: iam-service
          uri: http://iam-service:8080
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - StripPrefix=0

        # --- Policy Service ---
        - id: policy-service
          uri: http://policy-service:8080
          predicates:
            - Path=/api/v1/policies/**
          filters:
            - StripPrefix=0

        # --- Client Service ---
        - id: client-service
          uri: http://client-service:8080
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - StripPrefix=0

        # --- Billing Service ---
        - id: billing-service
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/billing/**, /api/v1/invoices/**, /api/v1/payments/**
          filters:
            - StripPrefix=0

        # --- Claims Service ---
        - id: claims-service
          uri: http://claims-service:8080
          predicates:
            - Path=/api/v1/claims/**
          filters:
            - StripPrefix=0

        # --- Notification Service ---
        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

        # --- Workflow Service ---
        - id: workflow-service
          uri: http://workflow-service:8080
          predicates:
            - Path=/api/v1/workflows/**
          filters:
            - StripPrefix=0

        # --- Swagger API Docs Endpoints ---
        - id: iam-api-docs
          uri: http://iam-service:8080
          predicates:
            - Path=/v3/api-docs/iam-service
          filters:
            - RewritePath=/v3/api-docs/iam-service, /v3/api-docs

        - id: client-api-docs
          uri: http://client-service:8080
          predicates:
            - Path=/v3/api-docs/client-service
          filters:
            - RewritePath=/v3/api-docs/client-service, /v3/api-docs

        - id: policy-api-docs
          uri: http://policy-service:8080
          predicates:
            - Path=/v3/api-docs/policy-service
          filters:
            - RewritePath=/v3/api-docs/policy-service, /v3/api-docs

        - id: claims-api-docs
          uri: http://claims-service:8080
          predicates:
            - Path=/v3/api-docs/claims-service
          filters:
            - RewritePath=/v3/api-docs/claims-service, /v3/api-docs

        - id: notification-api-docs
          uri: http://notification-service:8080
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

        - id: workflow-api-docs
          uri: http://workflow-service:8080
          predicates:
            - Path=/v3/api-docs/workflow-service
          filters:
            - RewritePath=/v3/api-docs/workflow-service, /v3/api-docs

        - id: billing-api-docs
          uri: http://billing-service:8080
          predicates:
            - Path=/v3/api-docs/billing-service
          filters:
            - RewritePath=/v3/api-docs/billing-service, /v3/api-docs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: All Services
        url: /v3/api-docs/all
      - name: IAM Service
        url: /v3/api-docs/iam-service
      - name: Client Service
        url: /v3/api-docs/client-service
      - name: Policy Service
        url: /v3/api-docs/policy-service
      - name: Claims Service
        url: /v3/api-docs/claims-service
      - name: Notification Service
        url: /v3/api-docs/notification-service
      - name: Workflow Service
        url: /v3/api-docs/workflow-service
      - name: Billing Service
        url: /v3/api-docs/billing-service
    urls-primary-name: All Services

# JWT
jwt:
  secret: ${JWT_SECRET:myDefaultSecretKeyForDevelopmentOnlyMinimum32Characters}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
