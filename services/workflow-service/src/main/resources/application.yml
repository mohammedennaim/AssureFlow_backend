server:
  port: 8087

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
  show-actuator: false
  packages-to-scan: com.pfe.workflow.infrastructure.web.controller
  paths-to-match: /api/v1/**

spring:
  application:
    name: workflow-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:workflow_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
      data-locations: classpath:data.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: workflow-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/workflow_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
      data-locations: classpath:data.sql
server:
  port: 8080
