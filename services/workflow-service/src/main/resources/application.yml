# ============================================================
# 🔄 WORKFLOW SERVICE - Specific Configuration
# ============================================================
# Imports shared configuration from shared-kernel
# Note: Workflow service uses ddl-auto: none (manual schema)
# ============================================================

spring:
  config:
    import: "classpath:/application-shared.yml"
  application:
    name: workflow-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:workflow_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
      data-locations: classpath:data.sql
  kafka:
    consumer:
      group-id: workflow-service-group

# ============================================================
# 📚 SpringDoc (Service-Specific Package Scan)
# ============================================================
springdoc:
  packages-to-scan: com.pfe.workflow.infrastructure.web.controller

# ============================================================
# 🌐 Server Configuration
# ============================================================
server:
  port: 8087

# ============================================================
# 🐳 Docker Profile Overrides (Service-Specific)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/workflow_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
      data-locations: classpath:data.sql
server:
  port: 8080
