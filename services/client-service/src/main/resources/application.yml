# ============================================================
# 👥 CLIENT SERVICE - Specific Configuration
# ============================================================
# Imports shared configuration from shared-kernel
# ============================================================

spring:
  config:
    import: "classpath:/application-shared.yml"
  application:
    name: client-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:client_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  kafka:
    consumer:
      group-id: client-service-group

# ============================================================
# 📚 SpringDoc (Service-Specific Package Scan)
# ============================================================
springdoc:
  packages-to-scan: com.pfe.client.infrastructure.web.controller

# ============================================================
# 🌐 Server Configuration
# ============================================================
server:
  port: 8084

# ============================================================
# 🐳 Docker Profile Overrides (Service-Specific)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/client_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
server:
  port: 8080
