# ============================================================
# 🚨 CLAIMS SERVICE - Specific Configuration
# ============================================================
# Imports shared configuration from shared-kernel
# ============================================================

spring:
  config:
    import: "classpath:/application-shared.yml"
  application:
    name: claims-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:claims_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  kafka:
    consumer:
      group-id: claims-service-group

# ============================================================
# 🔗 Feign Client Configuration (Service-Specific)
# ============================================================
feign:
  client:
    config:
      policy-service:
        url: ${FEIGN_CLIENT_CONFIG_POLICY-SERVICE_URL:http://localhost:8086}
      client-service:
        url: ${FEIGN_CLIENT_CONFIG_CLIENT-SERVICE_URL:http://localhost:8084}
  circuitbreaker:
    enabled: true

# ============================================================
# 🛡️ Resilience4j (Service-Specific Circuit Breakers)
# ============================================================
resilience4j:
  circuitbreaker:
    instances:
      policy-service:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      policy-service:
        max-attempts: 3
        wait-duration: 500ms

# ============================================================
# 🔑 Service Account Token (Claims-Service Specific)
# ============================================================
service:
  account:
    token: ${SERVICE_ACCOUNT_TOKEN:}

# ============================================================
# 🗄️ Secondary DataSource (for client_db lookup)
# ============================================================
secondary:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${CLIENT_DB_NAME:client_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}

# ============================================================
# 📚 SpringDoc (Service-Specific Package Scan)
# ============================================================
springdoc:
  packages-to-scan: com.pfe.claims.infrastructure.web.controller

# ============================================================
# 🌐 Server Configuration
# ============================================================
server:
  port: 8083

# ============================================================
# 🐳 Docker Profile Overrides (Service-Specific)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/claims_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
secondary:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/client_db
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}

server:
  port: 8080

feign:
  client:
    config:
      policy-service:
        url: http://policy-service:8080
      client-service:
        url: http://client-service:8080
