server:
  port: 8085

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
  show-actuator: false
  packages-to-scan: com.pfe.notification.infrastructure.web.controller
  paths-to-match: /api/v1/**

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: embedded
      continue-on-error: false
      encoding: UTF-8
      schema-locations: classpath*:schema.sql
      data-locations: classpath*:data.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:1}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # Session timeout configuration - increased for stability
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
        max.poll.interval.ms: 300000
        max.poll.records: 100
        fetch.max.wait.ms: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:assureflow@gmail.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 30000
          writetimeout: 30000

# Twilio SMS Configuration
twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:your_account_sid}
  auth:
    token: ${TWILIO_AUTH_TOKEN:your_auth_token}
  phone:
    number: ${TWILIO_PHONE_NUMBER:+1234567890}

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:1}
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
      data-locations: classpath:data.sql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:assureflow@gmail.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 30000
          writetimeout: 30000
  # Twilio SMS Configuration (Docker)
twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:your_account_sid}
  auth:
    token: ${TWILIO_AUTH_TOKEN:your_auth_token}
  phone:
    number: ${TWILIO_PHONE_NUMBER:+1234567890}
server:
  port: 8080
