server:
  port: 8082

spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:postgresql://localhost:5432/assureflow_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

feign:
  client:
    config:
      policy-service:
        url: http://localhost:8086

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-db:5432/assureflow_db

feign:
  client:
    config:
      policy-service:
        url: http://policy-service:8080

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
