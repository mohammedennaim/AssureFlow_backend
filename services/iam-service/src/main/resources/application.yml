# ============================================================
# 🔐 IAM SERVICE - Specific Configuration
# ============================================================
# Imports shared configuration from shared-kernel
# ============================================================

spring:
  config:
    import: "classpath:/application-shared.yml"
  application:
    name: iam-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iam_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  kafka:
    consumer:
      group-id: iam-service-group

# ============================================================
# 📚 SpringDoc (Service-Specific Package Scan)
# ============================================================
springdoc:
  packages-to-scan: com.pfe.iam.infrastructure.web.controller

# ============================================================
# 📝 Logging Configuration (IAM-Service Specific)
# ============================================================
logging:
  level:
    com.pfe.iam: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

# ============================================================
# 🌐 Server Configuration
# ============================================================
server:
  port: 8080

# ============================================================
# 🐳 Docker Profile Overrides (Service-Specific)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/iam_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
      hibernate.hbm2ddl.import_files: data.sql
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
server:
  port: 8080
