server:
  port: 8080

spring:
  application:
    name: iam-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iam_db}
    username: ${DB_USER:assureflow}
    password: ${DB_PASSWORD:assureflow123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: embedded
      continue-on-error: false
      encoding: UTF-8
      schema-locations: classpath*:schema.sql
      data-locations: classpath*:data.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret_2024}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: iam-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
  show-actuator: false
  packages-to-scan: com.pfe.iam.infrastructure.web.controller
  paths-to-match: /api/v1/**

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

# Logging
logging:
  level:
    com.pfe.iam: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/iam_db}
    username: ${SPRING_DATASOURCE_USERNAME:assureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:assureflow_secure_2024}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis_secret_2024}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
      hibernate.hbm2ddl.import_files: data.sql
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
server:
  port: 8080
