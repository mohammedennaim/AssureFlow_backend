server:
  port: 8086

spring:
  application:
    name: policy-service
  datasource:
    url: jdbc:postgresql://localhost:5432/assureflow_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-db:5432/assureflow_db
